name: temperaturaapp

services:

  # ─── Infraestrutura ────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 10s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 5

  # ─── Observabilidade ────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    ports:
      - "4317:4317"      # gRPC
      - "4318:4318"      # HTTP
      - "8889:8889"      # Prometheus metrics
    volumes:
      - ./k8s/configmaps/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"      # http://localhost:9090
    volumes:
      - ./k8s/configmaps/prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"      # http://localhost:3001 (admin / admin123)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana

  # ─── APIs ──────────────────────────────────────────────────────────────────

  api-weather:
    build:
      context: ./api-weather
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      RABBITMQ_URL: amqp://rabbitmq:5672
      MONGODB_URI: mongodb://mongodb:27017/temperaturadb
      REDIS_URL: redis://redis:6379
      SQLITE_PATH: /data/api-weather.db
      OTEL_SERVICE_NAME: api-weather
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - sqlite-weather:/data
    depends_on:
      rabbitmq: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      retries: 5

  api-location:
    build:
      context: ./api-location
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://rabbitmq:5672
      MONGODB_URI: mongodb+srv://guilhermesantannait:Tree2026Tere@cluster0.7j5tz4z.mongodb.net/temperaturadb
      REDIS_URL: redis://redis:6379
      SQLITE_PATH: /data/api-location.db
      OTEL_SERVICE_NAME: api-location
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - sqlite-location:/data
    depends_on:
      rabbitmq: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      retries: 5

  api-person:
    build:
      context: ./api-person
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://rabbitmq:5672
      MONGODB_URI: mongodb+srv://guilhermesantannait:Tree2026Tere@cluster0.7j5tz4z.mongodb.net/temperaturadb
      SQLITE_PATH: /data/api-person.db
      OTEL_SERVICE_NAME: api-person
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - sqlite-person:/data
    depends_on:
      rabbitmq: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      retries: 5

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"        # http://localhost:8080
    depends_on:
      api-weather:  { condition: service_healthy }
      api-location: { condition: service_healthy }
      api-person:   { condition: service_healthy }

volumes:
  mongodb-data:
  grafana-data:
  sqlite-weather:
  sqlite-location:
  sqlite-person:
