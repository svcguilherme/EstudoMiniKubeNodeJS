server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # React SPA — redirect all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: /api/weather/* → api-weather service
    location /api/weather/ {
        proxy_pass         http://api-weather:3001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy: /api/forecast/* → api-weather service (forecast route)
    location /api/forecast/ {
        proxy_pass         http://api-weather:3001/forecast/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy: /api/location/* → api-location service
    location /api/location/ {
        proxy_pass         http://api-location:3002/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy: /api/person/* → api-person service
    location /api/person/ {
        proxy_pass         http://api-person:3003/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
