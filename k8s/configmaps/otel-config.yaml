apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: temperaturaapp
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 100

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: otel
      logging:
        loglevel: warn

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [logging]
        metrics:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [prometheus]
