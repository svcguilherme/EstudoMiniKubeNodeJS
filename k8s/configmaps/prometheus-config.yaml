apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: temperaturaapp
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: api-weather
        static_configs:
          - targets: [api-weather:3001]
        metrics_path: /metrics

      - job_name: api-location
        static_configs:
          - targets: [api-location:3002]
        metrics_path: /metrics

      - job_name: api-person
        static_configs:
          - targets: [api-person:3003]
        metrics_path: /metrics

      - job_name: otel-collector
        static_configs:
          - targets: [otel-collector:8889]

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [temperaturaapp]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
