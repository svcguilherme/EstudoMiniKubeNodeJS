apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-person
  namespace: temperaturaapp
  labels:
    app: api-person
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-person
  template:
    metadata:
      labels:
        app: api-person
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3003"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: api-person
          image: api-person:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: RABBITMQ_URL
              value: amqp://rabbitmq:5672
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: MONGODB_URI
            - name: SQLITE_PATH
              value: /data/api-person.db
            - name: OTEL_SERVICE_NAME
              value: api-person
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: sqlite-person-pvc
